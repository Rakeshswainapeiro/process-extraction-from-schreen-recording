<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Screen -->
  <rect x="12" y="10" width="40" height="26" rx="4" fill="#E0E7FF" opacity="0.9"/>
  <rect x="15" y="13" width="34" height="20" rx="2" fill="#312E81" opacity="0.85"/>
  <!-- Record dot -->
  <circle cx="20" cy="18" r="2" fill="#EF4444"/>
  <!-- Activity lines -->
  <line x1="19" y1="24" x2="33" y2="24" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="19" y1="28" x2="28" y2="28" stroke="#818CF8" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
  <!-- Stand -->
  <rect x="27" y="36" width="10" height="3" rx="1" fill="#C7D2FE" opacity="0.6"/>
  <!-- Arrow down -->
  <line x1="32" y1="40" x2="32" y2="45" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <polygon points="32,48 28,43 36,43" fill="#10B981"/>
  <!-- Process nodes -->
  <circle cx="18" cy="54" r="5" fill="#34D399" stroke="white" stroke-width="1.5"/>
  <line x1="23" y1="54" x2="27" y2="54" stroke="white" stroke-width="1.5"/>
  <circle cx="32" cy="54" r="5" fill="#F59E0B" stroke="white" stroke-width="1.5"/>
  <line x1="37" y1="54" x2="41" y2="54" stroke="white" stroke-width="1.5"/>
  <circle cx="46" cy="54" r="5" fill="#3B82F6" stroke="white" stroke-width="1.5"/>
</svg>
